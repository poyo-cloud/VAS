<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f4efe6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>VAS</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="ambient ambient-left"></div>
    <div class="ambient ambient-right"></div>

    <main class="app-shell">
      <section class="panel status-panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Session</p>
            <h2>進行状況</h2>
          </div>
          <div class="panel-actions">
            <button id="openCalibrationButton" class="button-secondary" type="button">
              校正
            </button>
            <button id="exportAllButton" class="button-secondary" type="button">
              保存済み履歴をCSV出力
            </button>
            <button id="resetDraftButton" class="button-ghost" type="button">
              下書きをリセット
            </button>
          </div>
        </div>

        <div id="statusSummary" class="summary-grid"></div>
        <div id="flowStrip" class="flow-strip"></div>
      </section>

      <section class="panel view-panel" id="viewPanel"></section>

      <section class="panel history-panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">History</p>
            <h2>保存済みセッション</h2>
          </div>
          <div class="panel-actions">
            <span id="historyCount" class="badge-soft">0 件</span>
            <button id="clearHistoryButton" class="button-ghost danger" type="button">
              履歴を全削除
            </button>
          </div>
        </div>

        <div id="historyList" class="history-list"></div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
